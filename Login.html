<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madam Liy Login</title>
  <link rel="stylesheet" href="/styles/loginstyle.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>
  <div class="bg-glow glow-4"></div>

  <div class="container">

    <div class="card">

      <div class="logo-box">

        <!-- Chef Icon -->
        <svg viewBox="0 0 24 24">
          <path d="M7 18h10" />
          <path d="M6 18v-3" />
          <path d="M18 18v-3" />
          <path d="M7 15h10" />
          <path d="M7 15c-2 0-3.5-1.5-3.5-3.5S5 8 7 8c.3-2.3 2-4 5-4s4.7 1.7 5 4c2 0 3.5 1.5 3.5 3.5S19 15 17 15" />
        </svg>

      </div>

      <h1 class="title">Madam Liy</h1>

      <p class="subtitle">
        Restaurant Management System
      </p>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username">
      </div>

      <div class="password-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password">
      </div>

      <button class="login-btn">
        Login
      </button>

      <div class="demo-box">

        <div class="demo-title">
          Demo Credentials:
        </div>

        <p>
          <strong>Admin:</strong>
          admin / admin123
        </p>

        <p>
          <strong>Cashier:</strong>
          cashier / cashier123
        </p>

      </div>

    </div>

  </div>
  <script src="/script/login.js"></script>
</body>

</html>
