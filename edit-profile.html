<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile - Madam Liy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="edit-profile.css"/>
</head>
<body class="bg-gray-50 font-sans">

  <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-20 hidden lg:hidden" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-30 flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-100">
      <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center"><span class="text-white text-lg">🍽️</span></div>
      <div><p class="font-bold text-gray-800 text-sm">Madam Liy</p><p class="text-xs text-gray-400">UC Walk</p></div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="dashboard.html"     class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><span>📊</span> Dashboard</a>
      <a href="kelola-menu.html"   class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><span>📋</span> Kelola Menu</a>
      <a href="kitchen-queue.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><span>🍳</span> Kitchen Queue</a>
      <a href="list-karyawan.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><span>👥</span> List Karyawan</a>
      <a href="edit-profile.html"  class="nav-link active flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium"><span>👤</span> Edit Profile</a>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <p class="text-xs text-gray-400">Logged in as</p>
      <p class="font-bold text-sm text-gray-700">Admin User</p>
      <p class="text-xs text-green-500 mb-3">Role: Admin</p>
      <button class="w-full bg-red-500 hover:bg-red-600 text-white text-sm py-2 rounded-xl font-medium transition">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="lg:ml-64 min-h-screen">
    <div class="lg:hidden flex items-center justify-between px-4 py-3 bg-white shadow-sm sticky top-0 z-10">
      <button onclick="openSidebar()" class="text-gray-600 text-2xl">☰</button>
      <p class="font-bold text-gray-700 text-sm">Edit Profile</p>
      <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-xs font-bold">A</div>
    </div>

    <div class="p-4 md:p-6 lg:p-8 space-y-6">
      <!-- Header -->
      <div class="fade-in">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Edit Profile</h1>
        <p class="text-gray-400 text-sm mt-1">Update your personal information</p>
      </div>

      <!-- Profile Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 max-w-2xl fade-in">
        <!-- Avatar section -->
        <div class="flex items-center gap-5 mb-8 pb-6 border-b border-gray-100">
          <div class="relative group cursor-pointer" onclick="triggerPhotoUpload()">
            <div id="avatar-circle" class="w-20 h-20 bg-green-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold overflow-hidden">
              <span id="avatar-initials">AU</span>
              <img id="avatar-img" class="hidden w-full h-full object-cover" alt=""/>
            </div>
            <!-- Hover overlay -->
            <div class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
              <span class="text-white text-xs font-semibold">📷 Ubah</span>
            </div>
          </div>
          <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)"/>
          <div>
            <p id="profile-name" class="font-bold text-lg text-gray-800">Admin User</p>
            <p class="text-sm text-gray-400">admin@madamliy.com</p>
            <button onclick="triggerPhotoUpload()" class="text-green-500 text-sm font-medium mt-1 hover:underline">Ganti Foto</button>
          </div>
        </div>

        <!-- Form -->
        <form id="profile-form" onsubmit="saveProfile(event)" class="space-y-5" novalidate>
          <!-- Row 1 -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">Nama Lengkap <span class="text-red-400">*</span></label>
              <input id="p-nama" value="Admin User" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-green-400 transition" placeholder="Nama lengkap"/>
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">Email <span class="text-red-400">*</span></label>
              <input id="p-email" type="email" value="admin@madamliy.com" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-green-400 transition" placeholder="Email"/>
            </div>
          </div>
          <!-- Row 2 -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">No. Telepon</label>
              <input id="p-telp" value="+62 812-3456-7890" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-green-400 transition"/>
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">Jabatan</label>
              <input id="p-jabatan" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-green-400 transition" placeholder="Jabatan Anda"/>
            </div>
          </div>
          <!-- Alamat -->
          <div>
            <label class="text-xs font-semibold text-gray-500 block mb-1.5">Alamat</label>
            <textarea id="p-alamat" rows="3" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-green-400 transition resize-none" placeholder="Alamat lengkap Anda"></textarea>
          </div>

          <!-- Change Password Section -->
          <div class="pt-4 border-t border-gray-100">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-gray-800">Ganti Password</h3>
              <button type="button" onclick="togglePasswordSection()" id="toggle-pw-btn" class="text-green-500 text-sm font-medium hover:underline">
                Tampilkan
              </button>
            </div>
            <div id="password-section" class="hidden space-y-4">
              <div>
                <label class="text-xs font-semibold text-gray-500 block mb-1.5">Password Lama</label>
                <div class="relative">
                  <input id="p-pw-lama" type="password" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 pr-10 text-sm outline-none focus:border-green-400 transition" placeholder="••••••••"/>
                  <button type="button" onclick="togglePw('p-pw-lama', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
                </div>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="text-xs font-semibold text-gray-500 block mb-1.5">Password Baru</label>
                  <div class="relative">
                    <input id="p-pw-baru" type="password" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 pr-10 text-sm outline-none focus:border-green-400 transition" placeholder="••••••••"/>
                    <button type="button" onclick="togglePw('p-pw-baru', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
                  </div>
                  <!-- Strength bar -->
                  <div class="mt-2 flex gap-1" id="strength-bar">
                    <div class="h-1 flex-1 rounded-full bg-gray-200" id="sb1"></div>
                    <div class="h-1 flex-1 rounded-full bg-gray-200" id="sb2"></div>
                    <div class="h-1 flex-1 rounded-full bg-gray-200" id="sb3"></div>
                    <div class="h-1 flex-1 rounded-full bg-gray-200" id="sb4"></div>
                  </div>
                  <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
                </div>
                <div>
                  <label class="text-xs font-semibold text-gray-500 block mb-1.5">Konfirmasi Password</label>
                  <div class="relative">
                    <input id="p-pw-konfirm" type="password" class="form-input w-full border border-gray-200 rounded-xl px-3 py-2.5 pr-10 text-sm outline-none focus:border-green-400 transition" placeholder="••••••••"/>
                    <button type="button" onclick="togglePw('p-pw-konfirm', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 sm:flex-none sm:px-8 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-xl text-sm font-semibold transition shadow-lg shadow-green-200">
              💾 Simpan Perubahan
            </button>
            <button type="button" onclick="resetForm()" class="flex-1 sm:flex-none sm:px-8 border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">
              Batal
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="edit-profile.js"></script>
</body>
</html>
