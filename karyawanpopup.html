<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madam Liy Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  @keyframes popup {

    from {
      opacity: 0;
      transform: translateY(20px) scale(.95);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .modal-actions {

    display: flex;

    gap: 12px;

    margin-top: 20px;
  }

  .btn-save {

    flex: 1;

    height: 50px;

    border: none;

    border-radius: 14px;

    background: #2dc86f;

    color: white;

    font-size: 16px;

    cursor: pointer;
  }

  .btn-cancel {

    width: 90px;

    border: none;

    border-radius: 14px;

    background: #f3f4f6;

    color: #374151;

    cursor: pointer;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {

    width: 100%;

    border: 1px solid #d1d5db;

    border-radius: 12px;

    padding: 14px 16px;

    font-size: 15px;

    outline: none;
  }

  .form-group textarea {

    resize: none;
  }

  .form-row {

    display: grid;

    grid-template-columns: 1fr 1fr;

    gap: 16px;
  }

  .form-group {

    margin-bottom: 18px;
  }

  .form-group label {

    display: block;

    margin-bottom: 8px;

    font-weight: 500;

    color: #374151;
  }

  .modal h2 {

    font-size: 24px;

    font-weight: 700;

    color: #111827;

    margin-bottom: 24px;
  }

  .modal {

    width: 670px;

    background: white;

    border-radius: 20px;

    padding: 32px;

    box-shadow:
      0 20px 50px rgba(0, 0, 0, .18);

    animation: popup .25s ease;
  }

  .modal-overlay {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0, 0, 0, .35);

    backdrop-filter: blur(3px);

    display: none;

    justify-content: center;
    align-items: center;

    z-index: 9999;
  }
</style>

<body>

  <div id="employeeModal" class="modal-overlay">

    <div class="modal">

      <h2>Tambah Karyawan Baru</h2>

      <form id="employeeForm">

        <div class="form-row">

          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Nama lengkap">
          </div>

          <div class="form-group">
            <label>Jabatan</label>

            <select>
              <option>Pilih Jabatan</option>
              <option>Manager</option>
              <option>Cashier</option>
              <option>Kitchen Staff</option>
              <option>Waiter</option>
            </select>
          </div>

        </div>

        <div class="form-row">

          <div class="form-group">
            <label>No. Telepon</label>
            <input type="text" placeholder="+62 xxx-xxxx-xxxx">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="email@madamliy.com">
          </div>

        </div>

        <div class="form-group">

          <label>Alamat</label>

          <textarea rows="4" placeholder="Alamat lengkap"></textarea>

        </div>

        <div class="modal-actions">

          <button type="submit" class="btn-save">

            Tambah Karyawan

          </button>

          <button type="button" class="btn-cancel" onclick="closeEmployeeModal()">

            Batal

          </button>

        </div>

      </form>

    </div>

  </div>
  <script>
    const employeeModal =
      document.getElementById("employeeModal");

    function openEmployeeModal() {

      employeeModal.style.display = "flex";

    }

    function closeEmployeeModal() {

      employeeModal.style.display = "none";

    }

    employeeModal.addEventListener("click", function (e) {

      if (e.target === employeeModal) {

        closeEmployeeModal();

      }

    });

    document
      .getElementById("employeeForm")
      .addEventListener("submit", function (e) {

        e.preventDefault();

        alert("Karyawan berhasil ditambahkan");

        closeEmployeeModal();

      });
  </script>
</body>
