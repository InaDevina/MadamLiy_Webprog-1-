<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Order</title>
  <link rel="stylesheet" href="/styles/list_order.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <div class="bg-glow glow-3"></div>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-top">

        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-utensils"></i>
          </div>

          <div>
            <h2>Madam Liy</h2>
            <span>UC Walk</span>
          </div>
        </div>

        <div class="menu">

          <a href="transactions.html" class="menu-item">
            <i class="fas fa-cart-shopping"></i>
            Sistem Kasir
          </a>

          <a href="list_order.html" class="menu-item active">
            <i class="fas fa-file-lines"></i>
            List Order
          </a>

        </div>

      </div>

      <div class="sidebar-bottom">

        <div class="user-card">
          <small>Logged in as</small>
          <h4>ina</h4>
          <div class="role">Role: Cashier</div>
        </div>

        <button class="logout">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </button>

      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <h1 class="page-title">
        List Order
      </h1>

      <div class="page-subtitle">
        View and manage all transactions
      </div>

      <div class="table-card">

        <div class="table-header">

          <h2>
            Daftar Transaksi
          </h2>

          <div class="filter-group">

            <input type="text" placeholder="Cari transaksi..." id="searchInput">

            <select id="statusFilter">

              <option value="">
                Semua Status
              </option>

              <option value="Process">
                Process
              </option>

              <option value="Completed">
                Completed
              </option>

            </select>

          </div>

        </div>

        <table>

          <thead>

            <tr>

              <th>ID TRANSAKSI</th>
              <th>TANGGAL & WAKTU</th>
              <th>ITEMS</th>
              <th>KASIR</th>
              <th>PEMBAYARAN</th>
              <th>TOTAL</th>
              <th>STATUS</th>
              <th>ACTIONS</th>

            </tr>

          </thead>

          <tbody id="transactionTable">

          </tbody>

        </table>

      </div>

    </main>

  </div>

  <script src="/script/list_order.js"></script>

</body>
